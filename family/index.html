<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center - Crittenden Family</title>
    
    
    <!-- Base styles for the dark theme -->
    <style>
        :root {
            --warm-bg: #0d1117;
            --card-bg: #161b22;
            --accent-orange: #E8834A;
            --accent-teal: #3fb950;
            --accent-gold: #d29922;
            --accent-rose: #f85149;
            --accent-blue: #58a6ff;
            --accent-purple: #bc8cff;
            --text-dark: #e6edf3;
            --text-mid: #8b949e;
            --text-light: #484f58;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
            --shadow-hover: 0 4px 20px rgba(0,0,0,0.4);
            --radius: 16px;
            
            /* Additional colors for other pages */
            --bg: #0d1117;
            --surface: #161b22;
            --card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --text-dim: #8b949e;
            --green: #3fb950;
            --green-dim: rgba(63,185,80,0.15);
            --red: #f85149;
            --red-dim: rgba(248,81,73,0.15);
            --blue: #58a6ff;
            --blue-dim: rgba(88,166,255,0.15);
            --yellow: #d29922;
            --orange: #d29922;
            --orange-dim: rgba(210,153,34,0.15);
            --purple: #bc8cff;
            --purple-dim: rgba(188,140,255,0.15);
            --teal: #14b8a6;
            --cyan: #06b6d4;
            --amber: #f59e0b;
            --lime: #84cc16;
            --pink: #ec4899;
            --indigo: #6366f1;
            --emerald: #10b981;
            --fuchsia: #d946ef;
            --rose: #f43f5e;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--warm-bg);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Navigation styles */
        #site-nav {
            background: #161b22;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-family: -apple-system, system-ui, sans-serif;
            font-size: 14px;
            border-bottom: 1px solid #30363d;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
        }
        
        #site-nav .brand {
            color: #E8834A;
            font-weight: 700;
            text-decoration: none;
            font-size: 15px;
        }
        
        #site-nav .hamburger {
            display: none;
            background: none;
            border: none;
            color: #8b949e;
            font-size: 22px;
            cursor: pointer;
            margin-left: auto;
            padding: 4px 8px;
        }
        
        #site-nav .nav-links {
            display: flex;
            gap: 16px;
        }
        
        #site-nav .nav-links a {
            color: #8b949e;
            text-decoration: none;
            font-size: 14px;
        }
        
        #site-nav .nav-links a.active {
            color: #fff;
            font-weight: 600;
        }
        
        #site-nav .nav-links a:hover {
            color: #c9d1d9;
        }
        
        @media (max-width: 600px) {
            #site-nav .hamburger {
                display: block;
            }
            
            #site-nav .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                gap: 12px;
                padding-top: 12px;
            }
            
            #site-nav.open .nav-links {
                display: flex;
            }
            
            #site-nav .nav-links a {
                font-size: 16px;
                padding: 4px 0;
            }
        }
    </style>
    
    
</head>

    <nav id="site-nav">
        <a href="/family/" class="brand">🏠 Crittendens</a>
        <button class="hamburger" onclick="document.getElementById('site-nav').classList.toggle('open')" aria-label="Menu">☰</button>
        <div class="nav-links">
            <a href="/family/" data-page="home" class="active">Home</a>
            <a href="/family/trips/" data-page="trips" >Trips</a>
            <a href="/family/diet/" data-page="diet" >Diet</a>
            <a href="/family/finance/" data-page="finance" >Finance</a>
            <a href="/family/fitness/" data-page="fitness" >Fitness</a>
            <a href="/family/sleep/" data-page="sleep" >Sleep</a>
            <a href="/family/habits/" data-page="habits" >Habits</a>
        </div>
    </nav>

    
    <header>
        <h1>Command Center</h1>
        <div class="subtitle">The Crittenden family dashboard</div>
    </header>
    <style>
        header {
            background: var(--card-bg);
            border-bottom: 1px solid #30363d;
            color: var(--text-dark);
            padding: 32px 24px 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        header h1 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            position: relative;
        }
        header .subtitle {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-top: 4px;
            font-weight: 500;
            position: relative;
            color: var(--text-mid);
        }
    </style>
    

    
<style>
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px;
  }
  .section-title {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: none;
    border: 1px solid #30363d;
  }
  .meals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }
  .meal-item {
    padding: 10px 14px;
    border-radius: 10px;
    background: #21262d;
    font-size: 0.9rem;
    transition: transform 0.1s;
  }
  .meal-item.today {
    background: linear-gradient(135deg, #E8834A, #f85149);
    color: white;
    font-weight: 600;
    transform: scale(1.02);
    box-shadow: 0 3px 12px rgba(232,131,74,0.3);
  }
  .meal-item .day { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; }
  .meal-item.today .day { opacity: 1; }
  .balance-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }
  .balance-item {
    padding: 14px;
    border-radius: 12px;
    background: #21262d;
    text-align: center;
  }
  .balance-item .name { font-weight: 600; font-size: 0.85rem; color: var(--text-mid); margin-bottom: 4px; }
  .balance-item .amount { font-size: 1.4rem; font-weight: 800; }
  .balance-item .amount.negative { color: var(--accent-rose); }
  .balance-item .amount.positive { color: var(--accent-teal); }
  .sugar-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(0,0,0,0.04);
  }
  .sugar-bar:last-child { border-bottom: none; }
  .sugar-bar { border-bottom-color: #30363d; }
  .sugar-bar .name { font-weight: 600; font-size: 0.9rem; min-width: 70px; }
  .sugar-bar .bar-wrap { flex: 1; height: 20px; background: #21262d; border-radius: 10px; overflow: hidden; }
  .sugar-bar .bar-fill { height: 100%; border-radius: 10px; transition: width 0.3s; }
  .sugar-bar .grams { font-weight: 700; font-size: 0.9rem; min-width: 50px; text-align: right; }
  .school-kid { margin-bottom: 16px; }
  .school-kid:last-child { margin-bottom: 0; }
  .school-kid h4 { font-size: 0.95rem; font-weight: 700; color: var(--accent-blue); margin-bottom: 6px; }
  .school-item {
    font-size: 0.88rem;
    padding: 6px 10px;
    margin: 4px 0;
    border-radius: 8px;
    background: #21262d;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .school-item .date-badge {
    font-size: 0.75rem;
    font-weight: 700;
    background: var(--accent-teal);
    color: white;
    padding: 2px 8px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .school-item.today .date-badge { background: var(--accent-orange); }
  .trips-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px;
    background: #21262d;
    border-radius: 12px;
    text-decoration: none;
    color: var(--text-dark);
    transition: transform 0.15s, box-shadow 0.15s;
    border: 1px solid #30363d;
  }
  .trips-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  .trips-card .trip-emoji { font-size: 2.2rem; }
  .trips-card .trip-info h4 { font-weight: 700; margin-bottom: 2px; }
  .trips-card .trip-info p { font-size: 0.88rem; color: var(--text-mid); }
  .guinea-pig-card {
    background: #21262d;
    border: 1px solid #30363d;
    text-align: center;
    padding: 16px;
    border-radius: 12px;
  }
  .guinea-pig-card .emoji { font-size: 2rem; }
  .guinea-pig-card .label { font-size: 0.85rem; color: var(--text-mid); font-weight: 600; margin-top: 4px; }
  .guinea-pig-card .amount { font-size: 1.6rem; font-weight: 800; color: var(--accent-teal); }
  .updated { text-align: center; font-size: 0.8rem; color: var(--text-light); margin-top: 16px; padding: 12px; }
  @media (max-width: 600px) {
    .meals-grid { grid-template-columns: 1fr 1fr; }
    .balance-grid { grid-template-columns: 1fr 1fr; }
    .container { padding: 16px 12px; }
  }
</style>

<div class="container" id="app">
  <!-- Meals -->

    <div style="margin-top: 14px;">

  <!-- Sugar -->
  <div class="card">

  <!-- School -->

  const today = new Date();
  const todayDay = dayNames[today.getDay()];

  // Meals
  const mealsGrid = document.getElementById('meals-grid');
  LIVE_DATA.meals.forEach(m => {
    const isToday = m.day === todayDay;
    const div = document.createElement('div');
    div.className = 'meal-item' + (isToday ? ' today' : '');
    div.innerHTML = '<div class="day">' + m.day + (isToday ? ' (today)' : '') + '</div>' + m.meal;

    const div = document.createElement('div');
