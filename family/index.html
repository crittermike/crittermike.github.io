<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crittenden Family Command Center</title>
<style>
  :root {
    --warm-bg: #FFF8F0;
    --card-bg: #FFFFFF;
    --accent-orange: #E8834A;
    --accent-teal: #2A9D8F;
    --accent-gold: #E9C46A;
    --accent-rose: #E76F51;
    --accent-blue: #457B9D;
    --accent-purple: #7C3AED;
    --text-dark: #2D3436;
    --text-mid: #636E72;
    --text-light: #B2BEC3;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-hover: 0 4px 20px rgba(0,0,0,0.12);
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--warm-bg);
    color: var(--text-dark);
    line-height: 1.6;
    min-height: 100vh;
  }
  nav {
    background: white;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  nav .brand {
    font-weight: 800;
    font-size: 1.1rem;
    color: var(--accent-orange);
    text-decoration: none;
  }
  nav a {
    text-decoration: none;
    color: var(--text-mid);
    font-weight: 600;
    font-size: 0.9rem;
    padding: 6px 12px;
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
  }
  nav a:hover { background: var(--warm-bg); color: var(--accent-orange); }
  nav a.active { background: var(--warm-bg); color: var(--accent-orange); }
  header {
    background: linear-gradient(135deg, var(--accent-orange), var(--accent-rose));
    color: white;
    padding: 32px 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.12) 0%, transparent 60%);
    pointer-events: none;
  }
  header h1 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.5px; position: relative; }
  header .subtitle { font-size: 0.95rem; opacity: 0.9; margin-top: 4px; font-weight: 500; position: relative; }
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px;
  }
  .section-title {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(0,0,0,0.04);
  }
  .meals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }
  .meal-item {
    padding: 10px 14px;
    border-radius: 10px;
    background: var(--warm-bg);
    font-size: 0.9rem;
    transition: transform 0.1s;
  }
  .meal-item.today {
    background: linear-gradient(135deg, var(--accent-orange), var(--accent-rose));
    color: white;
    font-weight: 600;
    transform: scale(1.02);
    box-shadow: 0 3px 12px rgba(232,131,74,0.3);
  }
  .meal-item .day { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; }
  .meal-item.today .day { opacity: 1; }
  .balance-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }
  .balance-item {
    padding: 14px;
    border-radius: 12px;
    background: var(--warm-bg);
    text-align: center;
  }
  .balance-item .name { font-weight: 600; font-size: 0.85rem; color: var(--text-mid); margin-bottom: 4px; }
  .balance-item .amount { font-size: 1.4rem; font-weight: 800; }
  .balance-item .amount.negative { color: var(--accent-rose); }
  .balance-item .amount.positive { color: var(--accent-teal); }
  .sugar-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(0,0,0,0.04);
  }
  .sugar-bar:last-child { border-bottom: none; }
  .sugar-bar .name { font-weight: 600; font-size: 0.9rem; min-width: 70px; }
  .sugar-bar .bar-wrap { flex: 1; height: 20px; background: #f0f0f0; border-radius: 10px; overflow: hidden; }
  .sugar-bar .bar-fill { height: 100%; border-radius: 10px; transition: width 0.3s; }
  .sugar-bar .grams { font-weight: 700; font-size: 0.9rem; min-width: 50px; text-align: right; }
  .school-kid { margin-bottom: 16px; }
  .school-kid:last-child { margin-bottom: 0; }
  .school-kid h4 { font-size: 0.95rem; font-weight: 700; color: var(--accent-blue); margin-bottom: 6px; }
  .school-item {
    font-size: 0.88rem;
    padding: 6px 10px;
    margin: 4px 0;
    border-radius: 8px;
    background: var(--warm-bg);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .school-item .date-badge {
    font-size: 0.75rem;
    font-weight: 700;
    background: var(--accent-teal);
    color: white;
    padding: 2px 8px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .school-item.today .date-badge { background: var(--accent-orange); }
  .trips-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px;
    background: linear-gradient(135deg, #e0f4fb, #f0faff);
    border-radius: 12px;
    text-decoration: none;
    color: var(--text-dark);
    transition: transform 0.15s, box-shadow 0.15s;
    border: 1px solid rgba(42,157,143,0.2);
  }
  .trips-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  .trips-card .trip-emoji { font-size: 2.2rem; }
  .trips-card .trip-info h4 { font-weight: 700; margin-bottom: 2px; }
  .trips-card .trip-info p { font-size: 0.88rem; color: var(--text-mid); }
  .guinea-pig-card {
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    border: 1px solid rgba(233,196,106,0.4);
    text-align: center;
    padding: 16px;
    border-radius: 12px;
  }
  .guinea-pig-card .emoji { font-size: 2rem; }
  .guinea-pig-card .label { font-size: 0.85rem; color: var(--text-mid); font-weight: 600; margin-top: 4px; }
  .guinea-pig-card .amount { font-size: 1.6rem; font-weight: 800; color: var(--accent-teal); }
  .updated { text-align: center; font-size: 0.8rem; color: var(--text-light); margin-top: 16px; padding: 12px; }
  @media (max-width: 600px) {
    .meals-grid { grid-template-columns: 1fr 1fr; }
    .balance-grid { grid-template-columns: 1fr 1fr; }
    nav { gap: 12px; padding: 10px 16px; }
    .container { padding: 16px 12px; }
  }
</style>
</head>
