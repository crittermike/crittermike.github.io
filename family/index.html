<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center - Crittenden Family</title>
    
    
    <!-- Base styles for the dark theme -->
    <style>
        :root {
            --warm-bg: #0d1117;
            --card-bg: #161b22;
            --accent-orange: #E8834A;
            --accent-teal: #3fb950;
            --accent-gold: #d29922;
            --accent-rose: #f85149;
            --accent-blue: #58a6ff;
            --accent-purple: #bc8cff;
            --text-dark: #e6edf3;
            --text-mid: #8b949e;
            --text-light: #484f58;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
            --shadow-hover: 0 4px 20px rgba(0,0,0,0.4);
            --radius: 16px;
            
            /* Additional colors for other pages */
            --bg: #0d1117;
            --surface: #161b22;
            --card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --text-dim: #8b949e;
            --green: #3fb950;
            --green-dim: rgba(63,185,80,0.15);
            --red: #f85149;
            --red-dim: rgba(248,81,73,0.15);
            --blue: #58a6ff;
            --blue-dim: rgba(88,166,255,0.15);
            --yellow: #d29922;
            --orange: #d29922;
            --orange-dim: rgba(210,153,34,0.15);
            --purple: #bc8cff;
            --purple-dim: rgba(188,140,255,0.15);
            --teal: #14b8a6;
            --cyan: #06b6d4;
            --amber: #f59e0b;
            --lime: #84cc16;
            --pink: #ec4899;
            --indigo: #6366f1;
            --emerald: #10b981;
            --fuchsia: #d946ef;
            --rose: #f43f5e;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--warm-bg);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Navigation styles */
        #site-nav {
            background: #161b22;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-family: -apple-system, system-ui, sans-serif;
            font-size: 14px;
            border-bottom: 1px solid #30363d;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
        }
        
        #site-nav .brand {
            color: #E8834A;
            font-weight: 700;
            text-decoration: none;
            font-size: 15px;
        }
        
        #site-nav .hamburger {
            display: none;
            background: none;
            border: none;
            color: #8b949e;
            font-size: 22px;
            cursor: pointer;
            margin-left: auto;
            padding: 4px 8px;
        }
        
        #site-nav .nav-links {
            display: flex;
            gap: 16px;
        }
        
        #site-nav .nav-links a {
            color: #8b949e;
            text-decoration: none;
            font-size: 14px;
        }
        
        #site-nav .nav-links a.active {
            color: #fff;
            font-weight: 600;
        }
        
        #site-nav .nav-links a:hover {
            color: #c9d1d9;
        }
        
        @media (max-width: 600px) {
            #site-nav .hamburger {
                display: block;
            }
            
            #site-nav .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                gap: 12px;
                padding-top: 12px;
            }
            
            #site-nav.open .nav-links {
                display: flex;
            }
            
            #site-nav .nav-links a {
                font-size: 16px;
                padding: 4px 0;
            }
        }
    </style>
    
    
</head>
<body>
    <!-- Navigation -->
    <nav id="site-nav">
        <a href="/family/" class="brand">🏠 Crittendens</a>
        <button class="hamburger" onclick="document.getElementById('site-nav').classList.toggle('open')" aria-label="Menu">☰</button>
        <div class="nav-links">
            <a href="/family/" data-page="home" class="active">Home</a>
            <a href="/family/trips/" data-page="trips" >Trips</a>
            <a href="/family/finance/" data-page="finance" >Finance</a>
            <a href="/family/chore-wheel/" data-page="chore-wheel" >Chore Wheel</a>
        </div>
    </nav>

    
    <header>
        <h1>Command Center</h1>
        <div class="subtitle">The Crittenden family dashboard</div>
    </header>
    <style>
        header {
            background: var(--card-bg);
            border-bottom: 1px solid #30363d;
            color: var(--text-dark);
            padding: 32px 24px 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        header h1 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            position: relative;
        }
        header .subtitle {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-top: 4px;
            font-weight: 500;
            position: relative;
            color: var(--text-mid);
        }
    </style>
    

    
<style>
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 16px;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
  }
  .nav-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 24px;
    background: var(--card-bg);
    border: 1px solid #30363d;
    border-radius: var(--radius);
    text-decoration: none;
    color: var(--text-dark);
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  }
  .nav-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
    border-color: var(--accent-orange);
  }
  .nav-card .emoji { font-size: 2.4rem; }
  .nav-card .info h3 {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .nav-card .info p {
    font-size: 0.9rem;
    color: var(--text-mid);
    margin: 0;
  }
</style>

<div class="container">
  <div class="cards">
    <a class="nav-card" href="/family/trips/">
      <span class="emoji">✈️</span>
      <div class="info">
        <h3>Trips</h3>
        <p>Upcoming family travel plans</p>
      </div>
    </a>
    <a class="nav-card" href="/family/finance/">
      <span class="emoji">💰</span>
      <div class="info">
        <h3>Finance</h3>
        <p>Spending trends & monthly insights</p>
      </div>
    </a>
    <a class="nav-card" href="/family/chore-wheel/">
      <span class="emoji">🎡</span>
      <div class="info">
        <h3>Chore Wheel</h3>
        <p>Spin to assign weekly chores</p>
      </div>
    </a>
  </div>
</div>

</body>
</html>
