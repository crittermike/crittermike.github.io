<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1d3557" />
  <title>Crittenden Chore Wheel</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo" aria-hidden="true">🎡</span>
      <h1>Chore Wheel</h1>
    </div>
    <div class="week" id="weekLabel">Week of —</div>
  </header>

  <main>
    <section class="wheel-section card">
      <div class="wheel-wrap">
        <div class="pointer" aria-hidden="true"></div>
        <svg id="wheel" viewBox="-110 -110 220 220" role="img" aria-label="Chore wheel"></svg>
      </div>

      <div class="kids" id="kids"></div>

      <div class="actions">
        <button id="spinAll" class="btn primary big">🎯 Spin for everyone</button>
        <button id="lockWeek" class="btn ghost">🔒 Lock in this week</button>
      </div>

      <div id="resultBanner" class="result-banner" hidden></div>
    </section>

    <section class="card">
      <details>
        <summary><h2>📋 Chores</h2></summary>
        <ul id="choreList" class="chore-list"></ul>
        <form id="addChoreForm" class="add-chore">
          <input id="newChore" type="text" placeholder="Add a chore…" maxlength="60" required />
          <button type="submit" class="btn">Add</button>
        </form>
        <p class="hint">Tip: keep at least 4 chores so every kid gets one.</p>
      </details>
    </section>

    <section class="card">
      <details open>
        <summary><h2>📜 History (last 4 weeks)</h2></summary>
        <div id="history" class="history"></div>
      </details>
    </section>

    <footer class="foot">
      <span>Built for the Crittenden fridge tablet 🦾</span>
      <button id="resetBtn" class="btn tiny ghost">Reset all</button>
    </footer>
  </main>

  <canvas id="confetti" aria-hidden="true"></canvas>

  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
