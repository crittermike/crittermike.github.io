<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crittenden Family Cookbook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --warm-cream: #fdf6e3;
            --rich-brown: #3d2c1e;
            --accent-rust: #c44d2b;
            --accent-sage: #6b8f71;
            --soft-gold: #d4a853;
            --card-bg: #fffef9;
            --shadow: 0 4px 24px rgba(61, 44, 30, 0.08);
            --shadow-hover: 0 8px 40px rgba(61, 44, 30, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--warm-cream);
            color: var(--rich-brown);
            line-height: 1.6;
            min-height: 100vh;
        }

        .hero {
            text-align: center;
            padding: 4rem 2rem 3rem;
            background: linear-gradient(180deg, #fff9ed 0%, var(--warm-cream) 100%);
            border-bottom: 1px solid rgba(212, 168, 83, 0.2);
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            color: var(--rich-brown);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .hero .subtitle {
            font-size: 1.1rem;
            color: var(--accent-sage);
            font-weight: 400;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .hero .divider {
            width: 80px;
            height: 3px;
            background: var(--soft-gold);
            margin: 1.5rem auto;
            border-radius: 2px;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 1rem 2rem;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-rust);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #8b7355;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            padding: 1.5rem 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1.25rem;
            border: 1.5px solid rgba(61, 44, 30, 0.15);
            border-radius: 100px;
            background: transparent;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--rich-brown);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--rich-brown);
            color: var(--warm-cream);
            border-color: var(--rich-brown);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .recipe-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            border: 1px solid rgba(212, 168, 83, 0.1);
            position: relative;
            overflow: hidden;
        }

        .recipe-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-rust), var(--soft-gold));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .recipe-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .recipe-card:hover::before {
            opacity: 1;
        }

        .recipe-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.3;
            color: var(--rich-brown);
        }

        .recipe-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }

        .meta-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 500;
        }

        .badge-protein {
            background: rgba(107, 143, 113, 0.12);
            color: var(--accent-sage);
        }

        .badge-cal {
            background: rgba(196, 77, 43, 0.1);
            color: var(--accent-rust);
        }

        .badge-effort {
            background: rgba(212, 168, 83, 0.15);
            color: #8b6914;
        }

        .badge-time {
            background: rgba(61, 44, 30, 0.08);
            color: var(--rich-brown);
        }

        .ingredients-section {
            margin-top: 1.25rem;
        }

        .ingredients-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #8b7355;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .ingredients-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .ingredient-chip {
            padding: 0.25rem 0.6rem;
            background: rgba(61, 44, 30, 0.04);
            border: 1px solid rgba(61, 44, 30, 0.08);
            border-radius: 4px;
            font-size: 0.78rem;
            color: #5a4a3a;
        }

        .recipe-notes {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: rgba(212, 168, 83, 0.08);
            border-radius: 8px;
            font-size: 0.82rem;
            color: #6b5a3a;
            font-style: italic;
        }

        .footer {
            text-align: center;
            padding: 3rem 2rem;
            color: #8b7355;
            font-size: 0.85rem;
        }

        .footer a {
            color: var(--accent-rust);
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
                padding: 1rem;
                gap: 1.5rem;
            }
            .hero { padding: 3rem 1.5rem 2rem; }
            .recipe-card { padding: 1.5rem; }
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: #8b7355;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <header class="hero">
        <h1>Crittenden Family Cookbook</h1>
        <div class="divider"></div>
        <p class="subtitle">Our Dinner Rotation</p>
    </header>

    <div class="stats-bar">
        <div class="stat">
            <div class="stat-value">12</div>
            <div class="stat-label">Recipes</div>
        </div>
        <div class="stat">
            <div class="stat-value">45g</div>
            <div class="stat-label">Avg Protein</div>
        </div>
        <div class="stat">
            <div class="stat-value">663</div>
            <div class="stat-label">Avg Calories</div>
        </div>
        <div class="stat">
            <div class="stat-value">100%</div>
            <div class="stat-label">Kid Approved</div>
        </div>
    </div>

    <div class="filters">
        <button class="filter-btn active" data-filter="all">All Recipes</button>
        <button class="filter-btn" data-filter="easy">Easy</button>
        <button class="filter-btn" data-filter="medium">Medium</button>
        <button class="filter-btn" data-filter="high-protein">High Protein (50g+)</button>
        <button class="filter-btn" data-filter="low-cal">Under 650 cal</button>
    </div>

    <main class="grid" id="recipe-grid"></main>

    <footer class="footer">
        <p>Made with 🍳 by CritterBot &bull; <a href="https://critter.blog">critter.blog</a></p>
        <p style="margin-top: 0.5rem; font-size: 0.75rem;">No mushrooms, no peppers, no fish. Nancy's rules.</p>
    </footer>

    <script>
    const recipes = [
        {
            name: "Meatloaf + Mashed Potatoes + Cabbage",
            protein: 45, cal: 700, effort: "medium",
            ingredients: ["ground beef", "breadcrumbs", "eggs", "ketchup", "potatoes", "butter", "milk", "cabbage"]
        },
        {
            name: "Clam Spaghetti with Garlic Bread & Roasted Broccoli",
            protein: 40, cal: 650, effort: "medium",
            ingredients: ["canned clams", "protein noodles", "garlic bread", "broccoli", "olive oil", "garlic", "white wine"]
        },
        {
            name: "Mexican Beef & Refried Bean Burritos",
            protein: 50, cal: 750, effort: "easy",
            ingredients: ["ground beef", "refried beans", "tortillas", "onions", "cheese", "sour cream", "taco seasoning"]
        },
        {
            name: "Goulash + Grilled Kielbasa + Pan-fried Zucchini & Squash",
            protein: 45, cal: 700, effort: "medium",
            ingredients: ["ground beef", "elbow macaroni", "diced tomatoes", "tomato sauce", "kielbasa", "zucchini", "yellow squash"]
        },
        {
            name: "Grilled Hamburgers & Hotdogs + Corn",
            protein: 50, cal: 800, effort: "easy",
            ingredients: ["ground beef patties", "hotdogs", "buns", "corn on the cob", "cheese slices", "condiments"]
        },
        {
            name: "Pesto Chicken + Noodles + Roasted Brussels Sprouts",
            protein: 50, cal: 650, effort: "medium",
            ingredients: ["chicken thighs", "pesto", "noodles", "Brussels sprouts", "balsamic glaze", "parmesan"]
        },
        {
            name: "Chicken Thigh & Veggie Soup with French Bread",
            protein: 40, cal: 550, effort: "medium",
            ingredients: ["chicken thighs", "carrots", "celery", "onion", "chicken broth", "French bread"]
        },
        {
            name: "Pot Roast with Carrots & Potatoes",
            protein: 55, cal: 650, effort: "easy-slow",
            ingredients: ["chuck roast", "carrots", "potatoes", "onions", "beef broth"],
            notes: "Set it and forget it. Great for busy days."
        },
        {
            name: "Marry Me Chicken",
            protein: 50, cal: 600, effort: "medium",
            ingredients: ["chicken breasts", "sun-dried tomatoes", "heavy cream", "parmesan", "garlic", "spinach", "Italian seasoning"]
        },
        {
            name: "Ritz Chicken Casserole",
            protein: 20, cal: 501, effort: "easy",
            ingredients: ["cream of chicken soup", "sour cream", "green onion", "rotisserie chicken", "Ritz crackers", "salted butter"],
            notes: "Family favorite! Use store-bought rotisserie chicken. 10 min prep, 25 min cook. Serves 6.",
            source: "thecountrycook.net"
        },
        {
            name: "Sheet Pan Italian Sausage with Roasted Veggies over Rice",
            protein: 45, cal: 650, effort: "easy",
            ingredients: ["Italian sausage links", "zucchini", "onions", "cherry tomatoes", "rice", "olive oil", "Italian seasoning"]
        },
        {
            name: "Chicken Fajitas with Onions, Zucchini & Corn",
            protein: 48, cal: 600, effort: "easy",
            ingredients: ["chicken breasts", "onions", "zucchini", "corn", "tortillas", "fajita seasoning", "lime"]
        }
    ];

    function effortLabel(e) {
        const map = { 'easy': '⚡ Easy', 'medium': '👨‍🍳 Medium', 'easy-slow': '🐌 Slow Cooker' };
        return map[e] || e;
    }

    function renderCard(recipe) {
        const notesHtml = recipe.notes ? `<div class="recipe-notes">${recipe.notes}</div>` : '';
        const sourceHtml = recipe.source ? `<div style="margin-top:0.5rem;font-size:0.72rem;color:#8b7355;">Source: ${recipe.source}</div>` : '';
        return `
            <article class="recipe-card" data-effort="${recipe.effort}" data-protein="${recipe.protein}" data-cal="${recipe.cal}">
                <h2>${recipe.name}</h2>
                <div class="recipe-meta">
                    <span class="meta-badge badge-protein">💪 ${recipe.protein}g protein</span>
                    <span class="meta-badge badge-cal">🔥 ${recipe.cal} cal</span>
                    <span class="meta-badge badge-effort">${effortLabel(recipe.effort)}</span>
                </div>
                <div class="ingredients-section">
                    <div class="ingredients-label">Ingredients</div>
                    <div class="ingredients-list">
                        ${recipe.ingredients.map(i => `<span class="ingredient-chip">${i}</span>`).join('')}
                    </div>
                </div>
                ${notesHtml}
                ${sourceHtml}
            </article>
        `;
    }

    function render(filter = 'all') {
        const grid = document.getElementById('recipe-grid');
        let filtered = recipes;
        if (filter === 'easy') filtered = recipes.filter(r => r.effort === 'easy' || r.effort === 'easy-slow');
        else if (filter === 'medium') filtered = recipes.filter(r => r.effort === 'medium');
        else if (filter === 'high-protein') filtered = recipes.filter(r => r.protein >= 50);
        else if (filter === 'low-cal') filtered = recipes.filter(r => r.cal < 650);

        if (filtered.length === 0) {
            grid.innerHTML = '<div class="no-results">No recipes match this filter.</div>';
        } else {
            grid.innerHTML = filtered.map(renderCard).join('');
        }
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(btn.dataset.filter);
        });
    });

    render();
    </script>
</body>
</html>
