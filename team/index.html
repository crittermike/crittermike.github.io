  let to;document.getElementById('sb').addEventListener('input',e=>{clearTimeout(to);to=setTimeout(()=>{sq=e.target.value.toLowerCase();pg={i:1,f:1,m:1,t:1};render()},150)});
  document.getElementById('df').addEventListener('change',e=>{df=e.target.value;pg={i:1,f:1,m:1,t:1};render()});
  document.getElementById('dt').addEventListener('change',e=>{dt=e.target.value;pg={i:1,f:1,m:1,t:1};render()});
  // Person filters
  const pf=document.getElementById('pf');
  pf.innerHTML='<button class="pf-btn active" data-p="all">All</button>'+D.team.map(t=>`<button class="pf-btn" data-p="${t.key}">${t.name}</button>`).join('');
  pf.addEventListener('click',e=>{if(!e.target.classList.contains('pf-btn'))return;pf.querySelectorAll('.pf-btn').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');sp=e.target.dataset.p;pg.f=1;render()});
  // Type filters
  const tf=document.getElementById('tf');
  tf.innerHTML=['all','positive','constructive','mixed','observation'].map(t=>`<button class="pf-btn${t==='all'?' active':''}" data-t="${t}">${t==='all'?'All Types':t}</button>`).join('');
  tf.addEventListener('click',e=>{if(!e.target.classList.contains('pf-btn'))return;tf.querySelectorAll('.pf-btn').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');st=e.target.dataset.t;pg.f=1;render()});
  document.getElementById('im').addEventListener('click',()=>{pg.i++;render()});
  document.getElementById('fm').addEventListener('click',()=>{pg.f++;render()});
  document.getElementById('mm').addEventListener('click',()=>{pg.m++;render()});
  document.getElementById('tm').addEventListener('click',()=>{pg.t++;render()});
}

function renderOverview(){
  document.getElementById('tg').innerHTML=D.team.map(t=>`<div class="team-card" onclick="goFeedback('${t.key}')">
    <div class="tc-hdr"><img class="tc-av" src="https://github.com/${t.github}.png" alt="${t.name}" onerror="this.style.display='none'"><div><div class="tc-name">${t.name}</div><div class="tc-role">${t.role}</div></div></div>
    <span class="${t.status==='active'?'badge-active':'badge-departed'}">${t.status}</span>${t.location?`<span style="font-size:12px;color:var(--text-muted);margin-left:8px">${t.location}</span>`:''}
    <div class="tc-focus">${t.focus}</div>
    <div class="tc-stats"><div class="tc-stat"><strong>${t.feedbackCount}</strong>Feedback</div><div class="tc-stat"><strong>${t.lastFeedback}</strong>Last entry</div></div>
  </div>`).join('');
}

function goFeedback(p){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  document.querySelector('[data-tab="feedback"]').classList.add('active');
  document.getElementById('p-feedback').classList.add('active');ct='feedback';sp=p;
  document.querySelectorAll('#pf .pf-btn').forEach(b=>b.classList.toggle('active',b.dataset.p===p));
  pg.f=1;render();
}

function render(){
  if(ct==='impact')renderImpact();
  else if(ct==='feedback')renderFeedback();
  else if(ct==='meetings')renderMeetings();
  else if(ct==='timeline')renderTimeline();
}

function renderImpact(){
  let items=fSearch(fDate(D.impact),['title',x=>x.bullets.join(' ')]);
  document.getElementById('is').innerHTML=stat(items.length,'Entries')+stat(items[0]?.date||'-','Most Recent');
  const s=items.slice(0,pg.i*ps);
  document.getElementById('il').innerHTML=s.map(e=>`<div class="entry-card"><div class="e-date">${e.date}</div>${e.title?`<div class="e-title">${esc(e.title)}</div>`:''}<ul class="e-bullets">${e.bullets.map(b=>`<li>${esc(b)}</li>`).join('')}</ul></div>`).join('');
  document.getElementById('im').style.display=s.length<items.length?'block':'none';
}

function renderFeedback(){
  let items=fDate(D.feedback);
  if(sp!=='all')items=items.filter(f=>f.person===sp);
  if(st!=='all')items=items.filter(f=>f.type===st);
  items=fSearch(items,['content','source',x=>P[x.person]||'']);
  document.getElementById('fs').innerHTML=stat(items.length,'Shown')+stat(items.filter(f=>f.type==='positive').length,'Positive')+stat(items.filter(f=>f.type==='constructive').length,'Constructive')+stat(items.filter(f=>f.type==='mixed').length,'Mixed');
  const s=items.slice(0,pg.f*ps);
  document.getElementById('fl').innerHTML=s.map(e=>`<div class="entry-card"><div class="fb-meta"><span class="e-date">${e.date}</span><span class="fb-person">${P[e.person]||e.person}</span><span class="fb-badge tp-${e.type}">${e.type}</span>${e.source?`<span class="fb-source">${esc(e.source)}</span>`:''}</div><div class="fb-content">${esc(e.content)}</div></div>`).join('');
  document.getElementById('fm').style.display=s.length<items.length?'block':'none';
}

function renderMeetings(){
  let items=fSearch(fDate(D.meetings),['title']);
  document.getElementById('ms').innerHTML=stat(items.length,'Meetings')+stat(new Set(items.map(m=>m.date)).size,'Unique Days');
  const s=items.slice(0,pg.m*ps);
  document.getElementById('ml').innerHTML=s.map(m=>`<div class="meeting-item"><span class="e-date">${m.date}</span><span style="font-size:14px">${esc(m.title)}</span></div>`).join('');
  document.getElementById('mm').style.display=s.length<items.length?'block':'none';
}

function renderTimeline(){
  let items=[];
  D.impact.forEach(e=>items.push({date:e.date,tp:'impact',title:e.title||e.bullets[0]?.substring(0,80)||''}));
  D.feedback.forEach(e=>items.push({date:e.date,tp:'feedback',title:(P[e.person]||'')+': '+e.content.substring(0,100)}));
  D.meetings.forEach(e=>items.push({date:e.date,tp:'meeting',title:e.title}));
  items.sort((a,b)=>b.date.localeCompare(a.date));
  items=fSearch(fDate(items),['title']);
  document.getElementById('ts').innerHTML=stat(items.length,'Total Events');
  const s=items.slice(0,pg.t*ps);
  document.getElementById('tl').innerHTML=s.map(x=>`<div class="tl-item ${x.tp==='feedback'?'tf':x.tp==='meeting'?'tm':''}"><span class="e-date">${x.date}</span><span class="tl-badge ${x.tp==='impact'?'bi':x.tp==='feedback'?'bf':'bm'}">${x.tp}</span><span style="font-size:13px">${esc(x.title)}</span></div>`).join('');
  document.getElementById('tm').style.display=s.length<items.length?'block':'none';
}

init();
</script>
</body>
</html>
