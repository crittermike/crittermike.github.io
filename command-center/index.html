<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manager Command Center</title>
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --yellow: #d29922;
  --red: #f85149;
  --purple: #bc8cff;
  --pink: #f778ba;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}
.app { max-width: 1400px; margin: 0 auto; padding: 16px; }

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.header h1 { font-size: 24px; font-weight: 600; white-space: nowrap; }
.header .subtitle { color: var(--text2); font-size: 14px; }

/* Search */
.search-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.search-bar input {
  flex: 1;
  min-width: 200px;
  padding: 8px 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.search-bar input:focus { border-color: var(--accent); }
.search-bar input::placeholder { color: var(--text2); }

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.tab {
  padding: 8px 16px;
  cursor: pointer;
  color: var(--text2);
  border-bottom: 2px solid transparent;
  font-size: 14px;
  white-space: nowrap;
  transition: all 0.15s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: inherit;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.tab .badge {
  background: var(--bg3);
  color: var(--text2);
  padding: 1px 6px;
  border-radius: 10px;
  font-size: 12px;
  margin-left: 6px;
}

/* Stats bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  text-align: center;
}
.stat-card .number { font-size: 28px; font-weight: 700; color: var(--accent); }
.stat-card .label { font-size: 12px; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Person filter pills */
.filter-pills {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.pill {
  padding: 4px 12px;
  border-radius: 16px;
  font-size: 13px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  transition: all 0.15s;
  font-family: inherit;
}
.pill:hover { border-color: var(--accent); color: var(--text); }
.pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.pill.departed { opacity: 0.6; }

/* Type filter pills */
.type-pill.positive { border-color: var(--green); }
.type-pill.positive.active { background: var(--green); }
.type-pill.constructive { border-color: var(--yellow); }
.type-pill.constructive.active { background: var(--yellow); color: var(--bg); }
.type-pill.mixed { border-color: var(--purple); }
.type-pill.mixed.active { background: var(--purple); }

/* Cards */
.card-list { display: flex; flex-direction: column; gap: 8px; }
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  transition: border-color 0.15s;
}
.card:hover { border-color: var(--accent); }
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 8px;
}
.card-date { color: var(--text2); font-size: 12px; white-space: nowrap; }
.card-category {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
  background: var(--bg3);
  color: var(--accent);
  text-transform: capitalize;
}
.card-person {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
  background: var(--bg3);
  color: var(--purple);
  margin-left: 6px;
}
.card-type {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
}
.card-type.positive { background: rgba(63,185,80,0.15); color: var(--green); }
.card-type.constructive { background: rgba(210,153,34,0.15); color: var(--yellow); }
.card-type.mixed { background: rgba(188,140,255,0.15); color: var(--purple); }
.card-type.unknown { background: var(--bg3); color: var(--text2); }
.card-body { color: var(--text); font-size: 14px; line-height: 1.6; }

/* Review content */
.review-content {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 12px;
}
.review-content h1, .review-content h2, .review-content h3 { margin: 16px 0 8px; }
.review-content h1 { font-size: 20px; }
.review-content h2 { font-size: 17px; color: var(--accent); }
.review-content h3 { font-size: 15px; color: var(--text2); }
.review-content blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  margin: 12px 0;
  color: var(--text2);
  font-style: italic;
}
.review-content p { margin: 8px 0; }
.review-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* Expandable */
.expandable { cursor: pointer; }
.expandable .expand-icon { color: var(--text2); font-size: 12px; margin-left: 8px; transition: transform 0.15s; }
.expandable.open .expand-icon { transform: rotate(90deg); }
.expand-content { display: none; margin-top: 12px; }
.expandable.open + .expand-content, .expandable.open .expand-content { display: block; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

/* Pagination */
.pagination {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 20px;
}
.page-btn {
  padding: 6px 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
}
.page-btn:hover { border-color: var(--accent); color: var(--text); }
.page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.page-btn:disabled { opacity: 0.4; cursor: default; }

/* Timeline */
.timeline-bar {
  display: flex;
  gap: 2px;
  height: 24px;
  margin-bottom: 24px;
  border-radius: 4px;
  overflow: hidden;
}
.timeline-segment {
  flex: 1;
  background: var(--bg3);
  position: relative;
  cursor: pointer;
  transition: background 0.15s;
}
.timeline-segment:hover { background: var(--accent); opacity: 0.8; }
.timeline-segment .tooltip {
  display: none;
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg3);
  color: var(--text);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 12px;
  white-space: nowrap;
  z-index: 10;
  pointer-events: none;
}
.timeline-segment:hover .tooltip { display: block; }

/* Responsive */
@media (max-width: 768px) {
  .app { padding: 8px; }
  .header h1 { font-size: 18px; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
}

/* Markdown rendering helpers */
.md-content ul { padding-left: 20px; margin: 8px 0; }
.md-content li { margin: 4px 0; }
.md-content strong { color: var(--text); }
.md-content code { background: var(--bg3); padding: 2px 6px; border-radius: 3px; font-size: 13px; }
.md-content a { color: var(--accent); text-decoration: none; }
.md-content a:hover { text-decoration: underline; }

/* Print */
@media print {
  body { background: #fff; color: #000; }
  .card { border-color: #ddd; }
  .tabs, .search-bar, .filter-pills { display: none; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1>🐋 Manager Command Center</h1>
      <div class="subtitle">Big Orca team data, all in one place</div>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" id="search" placeholder="Search everything... (impacts, feedback, reviews, meetings)" autocomplete="off">
  </div>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="impact">Impact Log</button>
    <button class="tab" data-tab="feedback">Feedback</button>
    <button class="tab" data-tab="reviews">Reviews</button>
    <button class="tab" data-tab="checkins">Check-ins</button>
    <button class="tab" data-tab="preps">1:1 Prep</button>
    <button class="tab" data-tab="weekly">Weekly Log</button>
  </div>

  <div class="filter-pills" id="filters"></div>
  <div id="content"></div>
  <div class="pagination" id="pagination"></div>
</div>

<script>
let DATA = null;
let state = {
  tab: 'impact',
  search: '',
  person: null,
  feedbackType: null,
  page: 1,
  perPage: 25,
};

async function loadData() {
  const resp = await fetch('data/data.json');
  DATA = await resp.json();
  render();
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function simpleMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^\> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/<\/ul>\s*<ul>/g, '')
    .replace(/^---$/gm, '<hr>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hublop])/gm, '<p>')
    ;
}

function matchSearch(text, query) {
  if (!query) return true;
  const lower = text.toLowerCase();
  return query.toLowerCase().split(/\s+/).every(w => lower.includes(w));
}

function renderStats() {
  const el = document.getElementById('stats-bar');
  const s = DATA.stats;
  el.innerHTML = `
    <div class="stat-card"><div class="number">${s.total_impacts}</div><div class="label">Impact Entries</div></div>
    <div class="stat-card"><div class="number">${s.total_feedback}</div><div class="label">Feedback Items</div></div>
    <div class="stat-card"><div class="number">${s.total_reviews}</div><div class="label">Reviews</div></div>
    <div class="stat-card"><div class="number">${s.total_checkins}</div><div class="label">Monthly Check-ins</div></div>
    <div class="stat-card"><div class="number">${s.total_preps}</div><div class="label">1:1 Preps</div></div>
    <div class="stat-card"><div class="number">${Object.keys(DATA.people).filter(k => DATA.people[k].status === 'active').length}</div><div class="label">Active Reports</div></div>
  `;
}

function renderTabs() {
  const counts = {
    impact: DATA.impacts.length,
    feedback: DATA.feedback.length,
    reviews: DATA.reviews.length,
    checkins: DATA.checkins.length,
    preps: DATA.preps.length,
    weekly: DATA.weekly.length,
  };
  document.querySelectorAll('.tab').forEach(t => {
    const tab = t.dataset.tab;
    t.classList.toggle('active', tab === state.tab);
    const badge = t.querySelector('.badge');
    if (!badge) {
      const b = document.createElement('span');
      b.className = 'badge';
      b.textContent = counts[tab] || 0;
      t.appendChild(b);
    }
  });
}

function renderFilters() {
  const el = document.getElementById('filters');
  let html = '';

  if (['feedback', 'checkins', 'preps', 'reviews'].includes(state.tab)) {
    html += '<button class="pill ' + (!state.person ? 'active' : '') + '" data-person="">All</button>';
    for (const [slug, info] of Object.entries(DATA.people)) {
      const cls = info.status === 'departed' ? 'departed' : '';
      html += `<button class="pill ${cls} ${state.person === slug ? 'active' : ''}" data-person="${slug}">${info.name}${info.status === 'departed' ? ' ⊘' : ''}</button>`;
    }
  }

  if (state.tab === 'feedback') {
    html += '<span style="margin: 0 8px; color: var(--border)">|</span>';
    html += '<button class="pill type-pill ' + (!state.feedbackType ? 'active' : '') + '" data-type="">All types</button>';
    for (const t of ['positive', 'constructive', 'mixed']) {
      html += `<button class="pill type-pill ${t} ${state.feedbackType === t ? 'active' : ''}" data-type="${t}">${t}</button>`;
    }
  }

  el.innerHTML = html;

  el.querySelectorAll('[data-person]').forEach(b => {
    b.onclick = () => { state.person = b.dataset.person || null; state.page = 1; render(); };
  });
  el.querySelectorAll('[data-type]').forEach(b => {
    b.onclick = () => { state.feedbackType = b.dataset.type || null; state.page = 1; render(); };
  });
}

function paginate(items) {
  const start = (state.page - 1) * state.perPage;
  const paged = items.slice(start, start + state.perPage);
  const totalPages = Math.ceil(items.length / state.perPage);
  return { items: paged, totalPages, total: items.length };
}

function renderPagination(totalPages, total) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }

  let html = `<button class="page-btn" ${state.page <= 1 ? 'disabled' : ''} data-page="${state.page - 1}">← Prev</button>`;
  
  const maxVisible = 7;
  let startP = Math.max(1, state.page - 3);
  let endP = Math.min(totalPages, startP + maxVisible - 1);
  if (endP - startP < maxVisible - 1) startP = Math.max(1, endP - maxVisible + 1);

  if (startP > 1) html += `<button class="page-btn" data-page="1">1</button><span style="color:var(--text2);padding:6px">...</span>`;
  for (let i = startP; i <= endP; i++) {
    html += `<button class="page-btn ${i === state.page ? 'active' : ''}" data-page="${i}">${i}</button>`;
  }
  if (endP < totalPages) html += `<span style="color:var(--text2);padding:6px">...</span><button class="page-btn" data-page="${totalPages}">${totalPages}</button>`;

  html += `<button class="page-btn" ${state.page >= totalPages ? 'disabled' : ''} data-page="${state.page + 1}">Next →</button>`;
  html += `<span style="color:var(--text2);font-size:12px;padding:8px">${total} items</span>`;

  el.innerHTML = html;
  el.querySelectorAll('[data-page]').forEach(b => {
    b.onclick = () => { state.page = parseInt(b.dataset.page); renderContent(); };
  });
}

function renderContent() {
  const el = document.getElementById('content');
  const q = state.search;

  if (state.tab === 'impact') {
    let items = DATA.impacts.filter(i => matchSearch(`${i.date} ${i.category} ${i.description}`, q));
    items.sort((a, b) => b.date.localeCompare(a.date));
    const { items: paged, totalPages, total } = paginate(items);

    if (!paged.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📋</div><div>No impact entries found</div></div>';
      renderPagination(0, 0);
      return;
    }

    el.innerHTML = '<div class="card-list">' + paged.map(i => `
      <div class="card">
        <div class="card-header">
          <div><span class="card-category">${escapeHtml(i.category)}</span></div>
          <span class="card-date">${i.date}</span>
        </div>
        <div class="card-body">${escapeHtml(i.description)}</div>
      </div>
    `).join('') + '</div>';
    renderPagination(totalPages, total);

  } else if (state.tab === 'feedback') {
    let items = DATA.feedback
      .filter(f => !state.person || f.person === state.person)
      .filter(f => !state.feedbackType || f.type === state.feedbackType)
      .filter(f => matchSearch(`${f.date} ${f.type} ${f.source} ${f.description} ${DATA.people[f.person]?.name || f.person}`, q));
    items.sort((a, b) => b.date.localeCompare(a.date));
    const { items: paged, totalPages, total } = paginate(items);

    if (!paged.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">💬</div><div>No feedback entries found</div></div>';
      renderPagination(0, 0);
      return;
    }

    el.innerHTML = '<div class="card-list">' + paged.map(f => `
      <div class="card">
        <div class="card-header">
          <div>
            <span class="card-type ${f.type}">${f.type}</span>
            <span class="card-person">${DATA.people[f.person]?.name || f.person}</span>
            <span style="color:var(--text2);font-size:12px;margin-left:6px">${escapeHtml(f.source)}</span>
          </div>
          <span class="card-date">${f.date}</span>
        </div>
        <div class="card-body">${escapeHtml(f.description)}</div>
      </div>
    `).join('') + '</div>';
    renderPagination(totalPages, total);

  } else if (state.tab === 'reviews') {
    let items = DATA.reviews
      .filter(r => !state.person || r.person === state.person)
      .filter(r => matchSearch(`${r.period} ${r.person} ${r.content} ${DATA.people[r.person]?.name || r.person}`, q));
    items.sort((a, b) => b.period.localeCompare(a.period));

    if (!items.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📝</div><div>No reviews found</div></div>';
      renderPagination(0, 0);
      return;
    }

    el.innerHTML = items.map((r, idx) => `
      <div class="review-content" style="cursor:pointer" onclick="this.classList.toggle('expanded'); this.querySelector('.review-body').style.display = this.classList.contains('expanded') ? 'block' : 'none'">
        <div class="card-header">
          <div>
            <span class="card-person">${DATA.people[r.person]?.name || r.person}</span>
            <span class="card-category" style="margin-left:6px">${r.period}</span>
          </div>
          <span style="color:var(--text2);font-size:13px">Click to expand ▸</span>
        </div>
        <div class="review-body md-content" style="display:none;margin-top:16px">${simpleMarkdown(escapeHtml(r.content))}</div>
      </div>
    `).join('');
    renderPagination(0, 0);

  } else if (state.tab === 'checkins') {
    let items = DATA.checkins
      .filter(c => !state.person || c.person === state.person)
      .filter(c => matchSearch(`${c.month} ${c.person} ${c.content} ${DATA.people[c.person]?.name || c.person}`, q));
    items.sort((a, b) => b.month.localeCompare(a.month));
    const { items: paged, totalPages, total } = paginate(items);

    if (!paged.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📅</div><div>No check-ins found</div></div>';
      renderPagination(0, 0);
      return;
    }

    el.innerHTML = '<div class="card-list">' + paged.map(c => `
      <div class="card" style="cursor:pointer" onclick="this.classList.toggle('expanded'); this.querySelector('.checkin-body').style.display = this.classList.contains('expanded') ? 'block' : 'none'">
        <div class="card-header">
          <div>
            <span class="card-person">${DATA.people[c.person]?.name || c.person}</span>
            <span class="card-category" style="margin-left:6px">${c.month}</span>
          </div>
          <span style="color:var(--text2);font-size:13px">▸</span>
        </div>
        <div class="checkin-body md-content" style="display:none;margin-top:12px">${simpleMarkdown(escapeHtml(c.content))}</div>
      </div>
    `).join('') + '</div>';
    renderPagination(totalPages, total);

  } else if (state.tab === 'preps') {
    let items = DATA.preps
      .filter(p => !state.person || p.person === state.person)
      .filter(p => matchSearch(`${p.date} ${p.person} ${p.content} ${DATA.people[p.person]?.name || p.person}`, q));
    items.sort((a, b) => b.date.localeCompare(a.date));
    const { items: paged, totalPages, total } = paginate(items);

    if (!paged.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📋</div><div>No prep notes found</div></div>';
      renderPagination(0, 0);
      return;
    }

    el.innerHTML = '<div class="card-list">' + paged.map(p => `
      <div class="card" style="cursor:pointer" onclick="this.classList.toggle('expanded'); this.querySelector('.prep-body').style.display = this.classList.contains('expanded') ? 'block' : 'none'">
        <div class="card-header">
          <div>
            <span class="card-person">${DATA.people[p.person]?.name || p.person}</span>
            <span class="card-date">${p.date}</span>
          </div>
          <span style="color:var(--text2);font-size:13px">▸</span>
        </div>
        <div class="prep-body md-content" style="display:none;margin-top:12px">${simpleMarkdown(escapeHtml(p.content))}</div>
      </div>
    `).join('') + '</div>';
    renderPagination(totalPages, total);

  } else if (state.tab === 'weekly') {
    let items = DATA.weekly
      .filter(w => matchSearch(`${w.title} ${w.content}`, q));

    if (!items.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📰</div><div>No weekly log entries found</div></div>';
      renderPagination(0, 0);
      return;
    }

    el.innerHTML = items.map(w => `
      <div class="review-content" style="cursor:pointer" onclick="this.classList.toggle('expanded'); this.querySelector('.weekly-body').style.display = this.classList.contains('expanded') ? 'block' : 'none'">
        <div class="card-header">
          <div><span class="card-category">${escapeHtml(w.title)}</span></div>
          <span style="color:var(--text2);font-size:13px">Click to expand ▸</span>
        </div>
        <div class="weekly-body md-content" style="display:none;margin-top:16px">${simpleMarkdown(escapeHtml(w.content))}</div>
      </div>
    `).join('');
    renderPagination(0, 0);
  }
}

function render() {
  renderStats();
  renderTabs();
  renderFilters();
  renderContent();
}

// Event listeners
document.getElementById('search').addEventListener('input', e => {
  state.search = e.target.value;
  state.page = 1;
  renderContent();
});

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    state.tab = t.dataset.tab;
    state.page = 1;
    state.person = null;
    state.feedbackType = null;
    render();
  });
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === '/' && !e.ctrlKey && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('search').blur();
  }
});

loadData();
</script>
</body>
</html>
